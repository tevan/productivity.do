<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Productivity — sign in</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #fafafa;
    color: #1a1a1a;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  @media (prefers-color-scheme: dark) {
    html, body { background: #0d0d0d; color: #f5f5f5; }
    .card { background: #1a1a1a !important; border-color: #2a2a2a !important; }
    input { background: #0d0d0d !important; color: #f5f5f5 !important; border-color: #333 !important; }
    .meta, p.help { color: #999 !important; }
    .err { background: rgba(220, 38, 38, 0.12) !important; }
  }
  .wrap {
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 400px;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 32px 28px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 24px;
    opacity: 0.85;
  }
  .brand-dot {
    width: 10px; height: 10px;
    background: #6366f1;
    border-radius: 2px;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }
  p.help {
    font-size: 14px;
    color: #6b7280;
    margin-bottom: 22px;
    line-height: 1.5;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    background: #fff;
    color: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus { border-color: #6366f1; }
  button {
    width: 100%;
    margin-top: 14px;
    padding: 11px 14px;
    border: none;
    border-radius: 8px;
    background: #4f46e5;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  button:hover { background: #4338ca; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .err {
    margin-top: 14px;
    padding: 10px 12px;
    background: rgba(220, 38, 38, 0.08);
    border: 1px solid rgba(220, 38, 38, 0.3);
    color: #b91c1c;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.5;
  }
  .links {
    margin-top: 24px;
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
    font-size: 13px;
  }
  a { color: #4f46e5; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .meta {
    margin-top: 20px;
    text-align: center;
    font-size: 12px;
    color: #9ca3af;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="brand">
      <span class="brand-dot"></span>
      Productivity
    </div>
    <h1>Private beta</h1>
    <p class="help">
      Productivity is in private beta. Enter the access password to continue.
      Curious? <a href="/home.html">See what we're building</a>.
    </p>
    <form id="form" autocomplete="off">
      <label for="password">Access password</label>
      <input id="password" type="password" name="password" autocomplete="off" autofocus required />
      <button id="submit" type="submit">Sign in</button>
      <div id="err" class="err" hidden></div>
    </form>
    <div class="links">
      <a href="/home.html">Home</a>
      <a href="/features.html">Features</a>
      <a href="/pricing.html">Pricing</a>
    </div>
    <div class="meta">productivity.do</div>
  </div>
</div>
<script>
  const form = document.getElementById('form');
  const errEl = document.getElementById('err');
  const btn = document.getElementById('submit');
  const pwField = document.getElementById('password');

  function getRedirectTarget() {
    const params = new URLSearchParams(window.location.search);
    const to = params.get('to');
    if (to && to.startsWith('/') && !to.startsWith('//')) return to;
    return '/';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errEl.hidden = true;
    btn.disabled = true;
    btn.textContent = 'Checking…';
    try {
      const res = await fetch('/site-gate/check', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwField.value }),
        credentials: 'include',
      });
      const data = await res.json().catch(() => ({}));
      if (data.ok) {
        window.location.href = getRedirectTarget();
        return;
      }
      let msg = data.error || 'Wrong password';
      if (typeof data.attemptsRemaining === 'number') {
        msg += ` — ${data.attemptsRemaining} ${data.attemptsRemaining === 1 ? 'attempt' : 'attempts'} remaining.`;
      }
      errEl.textContent = msg;
      errEl.hidden = false;
      pwField.value = '';
      pwField.focus();
    } catch (_) {
      errEl.textContent = 'Network error. Try again.';
      errEl.hidden = false;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  });
</script>
</body>
</html>
