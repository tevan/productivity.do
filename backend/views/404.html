<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page not found · Productivity</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    :root {
      --bg: #fafaf9;
      --surface: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #6b7280;
      --text-tertiary: #9ca3af;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --border: #e5e7eb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1115;
        --surface: #1a1d24;
        --text-primary: #f3f4f6;
        --text-secondary: #9ca3af;
        --text-tertiary: #6b7280;
        --border: #2a2e3a;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .wrap {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .code {
      font-size: 96px;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--accent);
      margin-bottom: 8px;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin: 0 0 8px;
      letter-spacing: -0.01em;
    }
    p {
      font-size: 14px;
      color: var(--text-secondary);
      margin: 0 0 24px;
      line-height: 1.5;
    }
    .actions {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-primary);
      transition: border-color 0.15s, background 0.15s;
    }
    .btn:hover { border-color: var(--accent); }
    .btn-primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }
    .links {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-tertiary);
    }
    .links a {
      color: var(--text-secondary);
      text-decoration: none;
      margin: 0 8px;
    }
    .links a:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>That page doesn't exist, or it may have moved. The link you followed may be broken.</p>
    <div class="actions">
      <a class="btn btn-primary" href="/">Open the app</a>
      <a class="btn" href="/home.html">Marketing home</a>
    </div>
    <div class="links">
      <a href="/home.html">Home</a> ·
      <a href="/features.html">Features</a> ·
      <a href="/pricing.html">Pricing</a> ·
      <a href="/developers">Developers</a> ·
      <a href="/about.html">About</a>
    </div>
  </div>
</body>
</html>
