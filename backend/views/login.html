<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Productivity</title>
  <script>
    // Apply theme class BEFORE CSS evaluates so we don't flash a light page
    // for dark-mode users on the way from login → SPA.
    (function () {
      try {
        var stored = localStorage.getItem('productivity_theme');
        var theme = stored;
        if (!theme || theme === 'system') {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.classList.add(theme);
      } catch (_) {
        document.documentElement.classList.add('light');
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html.light, html.light body { background: #f8f7f5; color: #1a1917; }
    html.dark, html.dark body { background: #0f1115; color: #e8eaed; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    html.light .login-card {
      background: #fff;
      border: 1px solid #e8e6e1;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    html.dark .login-card {
      background: #1a1d23;
      border: 1px solid #2d3139;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .login-card {
      border-radius: 12px;
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 380px;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      text-align: center;
      margin-bottom: 8px;
    }
    html.light .logo { color: #1a1917; }
    html.dark  .logo { color: #e8eaed; }
    .subtitle {
      text-align: center;
      font-size: 0.82rem;
      margin-bottom: 28px;
    }
    html.light .subtitle { color: #8a8680; }
    html.dark  .subtitle { color: #9ca3af; }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      margin-bottom: 6px;
    }
    html.light label { color: #6b6862; }
    html.dark  label { color: #9ca3af; }
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }
    html.light input[type="password"] {
      border: 1px solid #e0ddd8;
      background: #faf9f7;
      color: #1a1917;
    }
    html.dark input[type="password"] {
      border: 1px solid #2d3139;
      background: #0f1115;
      color: #e8eaed;
    }
    input[type="password"]:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin-top: 18px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #2563eb; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error {
      margin-top: 14px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      display: none;
    }
    html.light .error { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; }
    html.dark  .error { background: #3a1a1a; border: 1px solid #5a2222; color: #fca5a5; }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">Productivity</div>
    <div class="subtitle">Calendar</div>
    <form id="loginForm">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autofocus autocomplete="current-password" placeholder="Enter password">
      <button class="btn" type="submit" id="submitBtn">Sign in</button>
      <div class="error" id="errorMsg"></div>
    </form>
  </div>
  <script>
    const form = document.getElementById('loginForm');
    const errEl = document.getElementById('errorMsg');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: document.getElementById('password').value }),
        });
        const data = await res.json();
        if (data.ok) {
          window.location.href = '/';
        } else {
          errEl.textContent = data.error || 'Authentication failed';
          errEl.classList.add('show');
        }
      } catch (err) {
        errEl.textContent = 'Connection error';
        errEl.classList.add('show');
      }
      btn.disabled = false;
      btn.textContent = 'Sign in';
    });
  </script>
</body>
</html>
