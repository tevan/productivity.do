<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background tile with rounded corners -->
  <rect x="1" y="2" width="30" height="29" rx="6" fill="#3b82f6"/>
  <!-- Calendar body (white inset) -->
  <rect x="4" y="9" width="24" height="19" rx="3" fill="#ffffff"/>
  <!-- Header strip on calendar -->
  <rect x="4" y="9" width="24" height="5" rx="3" fill="#dbeafe"/>
  <!-- Binding rings -->
  <rect x="9" y="5" width="3" height="6" rx="1.5" fill="#1e3a5f"/>
  <rect x="20" y="5" width="3" height="6" rx="1.5" fill="#1e3a5f"/>
  <!-- Bold checkmark in the body suggesting "done / productive" -->
  <path d="M9 19 L14 24 L23 15" stroke="#3b82f6" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
